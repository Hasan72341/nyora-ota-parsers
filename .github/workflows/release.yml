name: Deploy OTA Parsers

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Verify parsers work before bundling
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Diagnostics & Verification
        run: npm test

  # Compile and Deploy to GitHub Pages
  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Resolve OTA Version
        id: ota_version
        env:
          NYORA_OTA_MANIFEST: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.json
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { readFileSync, existsSync } = await import('node:fs');
          const manifestUrl = process.env.NYORA_OTA_MANIFEST;
          let current = 0;
          try {
            const response = await fetch(manifestUrl);
            if (response.ok) {
              const manifest = await response.json();
              current = Number.parseInt(manifest.version, 10) || 0;
            }
          } catch {
            current = 0;
          }
          let baseline = 0;
          if (existsSync('VERSION')) {
            baseline = Number.parseInt(readFileSync('VERSION', 'utf8').trim(), 10) || 0;
          }
          console.log(`version=${Math.max(current, baseline) + 1}`);
          NODE

      - name: Compile Parser Bundle
        env:
          # Injects the target hosting URL into manifest.json
          NYORA_OTA_BASE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          NYORA_OTA_VERSION: ${{ steps.ota_version.outputs.version }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the built dist/ folder containing bundle, sources, and manifest
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
